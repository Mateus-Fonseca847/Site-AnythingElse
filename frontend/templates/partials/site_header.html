<header class="site-header">
  <div class="header-container">
    <div class="header-top">
      <a href="{{ url_for('home') }}" class="brand">
        <div class="brand-logo">
          <img
            src="https://down-tx-br.img.susercontent.com/br-11134216-81z1k-mfbl6utpk551f2_tn.webp"
            alt="Logo da marca"
          />
        </div>
      </a>

      <div class="search-wrapper">
        <form class="search-bar">
          <input type="text" placeholder="O que voce procura hoje?" />
          <button type="submit" aria-label="Pesquisar">
            <svg viewBox="0 0 24 24" fill="none">
              <circle
                cx="11"
                cy="11"
                r="7"
                stroke="currentColor"
                stroke-width="2"
              ></circle>
              <path
                d="M20 20L16.65 16.65"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
              ></path>
            </svg>
          </button>
        </form>
      </div>

      <div class="header-tools">
        <a href="#" class="tool-item">
          <svg viewBox="0 0 24 24" fill="none">
            <circle
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="2"
            ></circle>
            <path
              d="M9.09 9A3 3 0 0 1 15 10c0 2-3 2-3 4"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
            <circle cx="12" cy="17" r="1" fill="currentColor"></circle>
          </svg>
          <div class="tool-text">
            <span>Central de</span>
            <strong>Atendimento</strong>
          </div>
        </a>

        <button type="button" class="tool-item header-login-trigger">
          <svg viewBox="0 0 24 24" fill="none">
            <circle
              cx="12"
              cy="8"
              r="4"
              stroke="currentColor"
              stroke-width="2"
            ></circle>
            <path
              d="M4 20C4 16.6863 7.58172 14 12 14C16.4183 14 20 16.6863 20 20"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
          </svg>
          <div class="tool-text">
            <span>Entre ou</span>
            <strong>Cadastre-se</strong>
          </div>
        </button>

        <button
          type="button"
          class="tool-item cart-tool header-cart-trigger"
        >
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M6 7H18L17 20H7L6 7Z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            ></path>
            <path
              d="M9 7V5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7"
              stroke="currentColor"
              stroke-width="2"
            ></path>
          </svg>
          <div class="tool-text">
            <span>Minha Sacola</span>
            <strong class="header-cart-total">R$0,00</strong>
          </div>
        </button>
      </div>
    </div>

    <nav class="header-nav">
      <ul class="nav-menu">
        <li><a href="{{ url_for('novidades') }}">NOVIDADES</a></li>
        <li><a href="{{ url_for('camisetas') }}">VESTUARIO</a></li>
        <li><a href="{{ url_for('acessorios') }}">ACESSORIOS</a></li>
        <li><a href="{{ url_for('livros') }}">LIVROS</a></li>
        <li><a href="{{ url_for('filmes') }}">FILMES</a></li>
        <li><a href="{{ url_for('decoracao') }}">DECORACAO</a></li>
        <li><a href="{{ url_for('personalizacao') }}">PERSONALIZACAO</a></li>
      </ul>
    </nav>
  </div>
</header>
