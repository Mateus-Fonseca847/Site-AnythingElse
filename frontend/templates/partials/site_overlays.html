<div class="auth-modal" aria-hidden="true">
  <div class="auth-modal__overlay"></div>

  <div
    class="auth-modal__dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="auth-modal-title"
  >
    <button type="button" class="auth-modal__close" aria-label="Fechar">
      ×
    </button>

    <div class="auth-modal__tabs">
      <button
        type="button"
        class="auth-modal__tab is-active"
        data-auth-mode="login"
      >
        Entrar
      </button>
      <button
        type="button"
        class="auth-modal__tab"
        data-auth-mode="register"
      >
        Cadastrar
      </button>
    </div>

    <p class="auth-modal__subtitle" id="auth-modal-title">
      Entre com email e senha
    </p>

    <form class="auth-modal__form" id="authForm">
      <div class="auth-modal__field auth-modal__field--name" hidden>
        <input
          type="text"
          class="auth-modal__input"
          id="authName"
          placeholder="Digite seu nome"
        />
      </div>

      <div class="auth-modal__field">
        <input
          type="email"
          class="auth-modal__input"
          id="authEmail"
          placeholder="Ex.: exemplo@mail.com"
        />
      </div>

      <div class="auth-modal__password-wrap">
        <input
          type="password"
          class="auth-modal__input"
          id="authPassword"
          placeholder="Adicione sua senha"
        />
        <button
          type="button"
          class="auth-modal__eye"
          aria-label="Mostrar senha"
        >
          <svg viewBox="0 0 24 24" fill="none">
            <path
              d="M2 12C4.4 7.8 8 5.7 12 5.7C16 5.7 19.6 7.8 22 12C19.6 16.2 16 18.3 12 18.3C8 18.3 4.4 16.2 2 12Z"
              stroke="currentColor"
              stroke-width="1.8"
            />
            <circle cx="12" cy="12" r="3" fill="currentColor" />
          </svg>
        </button>
      </div>

      <div class="auth-modal__field auth-modal__field--confirm" hidden>
        <input
          type="password"
          class="auth-modal__input"
          id="authConfirmPassword"
          placeholder="Confirme sua senha"
        />
      </div>

      <a href="#" class="auth-modal__forgot auth-modal__forgot-link"
        >Esqueci minha senha</a
      >

      <p class="auth-modal__message" id="authMessage"></p>

      <div class="auth-modal__actions">
        <button type="button" class="auth-modal__back">← Voltar</button>
        <button
          type="submit"
          class="auth-modal__submit"
          id="authSubmitButton"
        >
          Entrar
        </button>
      </div>

      <p class="auth-modal__register">
        Não tem uma conta?
        <a href="#" class="auth-modal__switch-mode">Cadastre-se</a>
      </p>
    </form>
  </div>
</div>

<div class="account-menu" aria-hidden="true">
  <div class="account-menu__overlay"></div>

  <div class="account-menu__dialog">
    <button type="button" class="account-menu__close" aria-label="Fechar">
      ×
    </button>

    <p class="account-menu__title">Minha conta</p>
    <p class="account-menu__user" id="accountMenuUser">Usuário logado</p>

    <div class="account-menu__actions">
      <button
        type="button"
        class="account-menu__button"
        id="switchUserButton"
      >
        Trocar usuário
      </button>

      <button
        type="button"
        class="account-menu__button account-menu__button--danger"
        id="logoutButton"
      >
        Sair
      </button>
    </div>
  </div>
</div>

<div class="cart-drawer" aria-hidden="true">
  <div class="cart-drawer__overlay"></div>

  <aside
    class="cart-drawer__panel"
    role="dialog"
    aria-modal="true"
    aria-labelledby="cart-drawer-title"
  >
    <div class="cart-drawer__header">
      <button
        type="button"
        class="cart-drawer__close"
        aria-label="Fechar sacola"
      >
        ×
      </button>
      <h2 class="cart-drawer__title" id="cart-drawer-title">Sua sacola</h2>
    </div>

    <div class="cart-drawer__body">
      <div class="cart-drawer__empty">
        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M6 7H18L17 20H7L6 7Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linejoin="round"
          />
          <path
            d="M9 7V5C9 3.9 9.9 3 11 3H13C14.1 3 15 3.9 15 5V7"
            stroke="currentColor"
            stroke-width="1.8"
          />
        </svg>
        <p class="cart-drawer__empty-text">Sua sacola ainda está vazia</p>
        <a href="#" class="cart-drawer__empty-button">Escolher produtos</a>
      </div>

      <div class="cart-drawer__items" hidden></div>
    </div>

    <div class="cart-drawer__footer" hidden>
      <div class="cart-drawer__summary">
        <span>Total</span>
        <strong class="cart-drawer-total">R$0,00</strong>
      </div>

      <a
        href="{{ url_for('checkout') }}"
        class="cart-drawer__checkout"
      >
        Finalizar compra
      </a>
    </div>
  </aside>
</div>
